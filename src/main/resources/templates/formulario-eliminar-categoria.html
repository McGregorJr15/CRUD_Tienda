<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Eliminar Categoría</title></head>
<body style="font-family: Arial, sans-serif; padding: 20px;">
    <h2>Categorias - Eliminar</h2>
    <p><a th:href="@{/categorias}">Regresar</a></p>
    <form th:action="@{/categorias/eliminar/{id}(id=${categoria.id})}" method="post">
        <p>Nombre:<br><input type="text" th:value="${categoria.nombre}" readonly style="padding: 5px; width: 200px; background-color: #f9f9f9;"/></p>
        <button type="submit" style="padding: 5px 20px;">Eliminar</button>
    </form>
</body>
</html>
