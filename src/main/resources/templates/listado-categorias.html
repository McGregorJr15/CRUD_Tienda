<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Categorías</title></head>
<body style="font-family: Arial, sans-serif; padding: 20px;">
    <h2>Categorias</h2>
    <p><a th:href="@{/}">Regresar</a> &nbsp;&nbsp; <a th:href="@{/categorias/agregar}">Agregar Categoria</a></p>

    <table style="border-collapse: collapse; width: 50%; border: 1px solid #ddd; text-align: left;">
        <thead style="background-color: #f2f2f2;">
            <tr>
                <th style="padding: 8px; border: 1px solid #ddd;">id</th>
                <th style="padding: 8px; border: 1px solid #ddd;">Nombre</th>
                <th style="padding: 8px; border: 1px solid #ddd;">Accones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${categorias}">
                <td style="padding: 8px; border: 1px solid #ddd;" th:text="${c.id}"></td>
                <td style="padding: 8px; border: 1px solid #ddd;" th:text="${c.nombre}"></td>
                <td style="padding: 8px; border: 1px solid #ddd;">
                    <a th:href="@{/categorias/actualizar/{id}(id=${c.id})}">Actualizar</a> &nbsp;
                    <a th:href="@{/categorias/eliminar/{id}(id=${c.id})}">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
